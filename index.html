<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitabah">
<meta name="theme-color" content="#1B3A2C">
<title>Kitabah — PPG Sidoarjo Utara</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --green:       #1B3A2C;
  --green-mid:   #28503F;
  --green-soft:  #E7EFE9;
  --cream:       #FAF6EC;
  --cream-2:     #F2ECDD;
  --gold:        #C19A4B;
  --gold-soft:   #F6EFDD;
  --ink:         #2B2420;
  --ink-soft:    #6B6055;
  --line:        #E3D9C4;
  --white:       #FFFFFF;
  --rose:        #A6483B;
  --rose-soft:   #FBEAE7;

  --radius-sm:   8px;
  --radius:      12px;
  --radius-lg:   18px;
  --shadow:      0 4px 16px -4px rgba(27,36,32,.14);
  --shadow-lg:   0 16px 40px -12px rgba(27,36,32,.22);

  --font-body:    'Plus Jakarta Sans', sans-serif;
  --font-display: 'Fraunces', serif;

  --nav-h:       60px;
  --sidebar-w:   270px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { font-family: var(--font-body); cursor: pointer; border: none; }
input, select, textarea { font-family: var(--font-body); }
a { text-decoration: none; color: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }

/* ===== UTILITY ===== */
.hidden { display: none !important; }
.sr-only { position: absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-1 { flex: 1; min-width: 0; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11.5px; }
.fw-bold { font-weight: 700; }
.fw-800 { font-weight: 800; }
.color-soft { color: var(--ink-soft); }
.color-green { color: var(--green); }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== LAYOUT ===== */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ===== LOGIN SCREEN ===== */
.login-screen {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  background:
    radial-gradient(ellipse at 15% 20%, #2d5a47 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, #1a3828 0%, transparent 55%),
    var(--green);
}
.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--cream);
  border-radius: var(--radius-lg);
  padding: 36px 32px 28px;
  box-shadow: var(--shadow-lg);
  animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
}
.login-logo {
  width: 72px; height: 72px;
  border-radius: 50%;
  margin: 0 auto 16px;
  display: block;
  border: 3px solid var(--gold-soft);
  object-fit: cover;
}
.login-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  text-align: center;
  color: var(--green);
  margin: 0 0 4px;
}
.login-subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--ink-soft);
  margin: 0 0 24px;
  line-height: 1.5;
}
.tab-row {
  display: flex;
  gap: 6px;
  background: var(--cream-2);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  background: transparent;
  color: var(--ink-soft);
  font-size: 13px;
  font-weight: 700;
  transition: all .15s;
}
.tab-btn.active { background: var(--green); color: #fff; }

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--green);
  margin-bottom: 6px;
}
.field input, .field select {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--white);
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-soft);
}
.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 800;
  transition: background .15s, transform .1s;
  margin-top: 4px;
}
.btn-primary:hover { background: #142e22; }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { background: #999; cursor: not-allowed; }
.alert {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 12px;
  display: none;
}
.alert.error { background: var(--rose-soft); color: var(--rose); border: 1px solid #f0c9c1; display: block; }
.alert.success { background: var(--green-soft); color: var(--green); border: 1px solid #bfd8c8; display: block; }
.alert.warning { background: var(--gold-soft); color: #8a6a24; border: 1px solid #e0c88a; display: block; }
.login-hint {
  margin-top: 20px;
  padding: 10px 12px;
  background: var(--cream-2);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--ink-soft);
  text-align: center;
  line-height: 1.6;
}

/* PENDING screen */
.pending-screen {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  background: radial-gradient(ellipse at 50% 40%, #2d5a47 0%, transparent 60%), var(--green);
}
.pending-card {
  max-width: 420px; width: 100%;
  background: var(--cream);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.pending-icon {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--gold-soft);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 28px;
}

/* ===== SHELL (authenticated) ===== */
.shell { flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* Top Nav */
.topnav {
  height: var(--nav-h);
  background: var(--green);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
.topnav-brand {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  flex: 1;
}
.topnav-brand span { color: var(--gold); }
.menu-toggle {
  width: 38px; height: 38px;
  background: rgba(255,255,255,.12);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.topnav-user {
  display: flex; align-items: center; gap: 8px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--green);
  flex-shrink: 0;
}
.topnav-user-info { line-height: 1.2; }
.topnav-user-name { font-size: 13px; font-weight: 700; color: #fff; }
.topnav-user-role { font-size: 11px; color: #B9C9BD; }

/* Layout */
.shell-body { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: var(--green);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: transform .25s;
}
.sidebar-nav { padding: 12px 10px; flex: 1; }
.nav-section { margin-bottom: 4px; }
.nav-section-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  padding: 10px 12px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,.75);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: var(--gold); color: var(--green); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--rose);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 20px;
}
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.logout-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: transparent;
  color: rgba(255,255,255,.6);
  font-size: 13px; font-weight: 700;
  transition: all .15s;
}
.logout-btn:hover { background: rgba(166,72,59,.4); color: #fff; }

/* Main content */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  min-width: 0;
}

/* Page header */
.page-header {
  margin-bottom: 22px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
  margin: 0 0 3px;
}
.page-subtitle { font-size: 13px; color: var(--ink-soft); margin: 0; }

/* Cards & panels */
.card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 12px; color: var(--ink-soft); font-weight: 600; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 700;
  transition: all .15s;
}
.btn svg { width: 15px; height: 15px; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #142e22; }
.btn-gold { background: var(--gold); color: var(--green); }
.btn-gold:hover { background: #a8853f; }
.btn-outline { background: var(--white); color: var(--ink); border: 1.5px solid var(--line); }
.btn-outline:hover { border-color: var(--green); color: var(--green); }
.btn-danger { background: var(--rose); color: #fff; }
.btn-danger:hover { background: #8b3930; }
.btn-sm { padding: 7px 12px; font-size: 12.5px; }
.btn-icon {
  width: 34px; height: 34px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  background: var(--cream-2);
  color: var(--ink-soft);
  border: 1px solid var(--line);
}
.btn-icon:hover { background: var(--green-soft); color: var(--green); border-color: var(--green); }
.btn-icon.danger:hover { background: var(--rose-soft); color: var(--rose); border-color: var(--rose); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th {
  background: var(--green);
  color: #fff;
  text-align: left;
  padding: 10px 12px;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: var(--cream); }
tr:hover td { background: var(--green-soft); }

/* Badge */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11.5px; font-weight: 700;
  text-transform: uppercase;
}
.badge-green { background: var(--green-soft); color: var(--green); }
.badge-gold { background: var(--gold-soft); color: #8a6a24; }
.badge-rose { background: var(--rose-soft); color: var(--rose); }
.badge-gray { background: var(--cream-2); color: var(--ink-soft); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(27,30,26,.55);
  backdrop-filter: blur(2px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--cream);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp .3s cubic-bezier(.16,1,.3,1) both;
}
.modal.modal-lg { max-width: 720px; }
.modal.modal-full { max-width: none; width: 100%; height: 94vh; max-height: 94vh; }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  color: var(--green); margin: 0;
}
.modal-close {
  width: 32px; height: 32px;
  background: var(--cream-2);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
}
.modal-close:hover { background: var(--line); }
.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 14px 22px;
  border-top: 1px solid var(--line);
  display: flex; justify-content: flex-end; gap: 8px;
  flex-shrink: 0;
}

/* Form elements in modal */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-row.single { grid-template-columns: 1fr; }
.form-group label {
  display: block;
  font-size: 11.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  color: var(--green); margin-bottom: 6px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--line); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 13.5px;
  background: var(--white); color: var(--ink);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft);
}
.form-group textarea { min-height: 80px; resize: vertical; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--green);
  color: #fff;
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13.5px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px); opacity: 0;
  transition: all .25s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: var(--rose); }

/* Loading */
.spinner {
  width: 20px; height: 20px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}
.spinner.dark {
  border-color: rgba(27,58,44,.2);
  border-top-color: var(--green);
}
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--cream);
  display: none; align-items: center; justify-content: center;
  z-index: 300; flex-direction: column; gap: 14px;
}
.loading-overlay.show { display: flex; }

/* Empty state */
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--ink-soft);
}
.empty-state svg { width: 48px; height: 48px; color: var(--line); margin-bottom: 12px; }
.empty-title { font-family: var(--font-display); font-size: 17px; color: var(--green); margin: 0 0 6px; }
.empty-desc { font-size: 13px; margin: 0; }

/* WA button */
.btn-wa {
  display: inline-flex; align-items: center; gap: 8px;
  background: #25D366; color: #fff;
  padding: 11px 18px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700;
  transition: background .15s;
}
.btn-wa:hover { background: #1ebf5a; }

/* Absensi buttons */
.absen-btn {
  width: 44px; height: 36px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 800;
  border: 2px solid transparent;
  transition: all .15s;
}
.absen-btn.H { background: var(--green-soft); color: var(--green); border-color: var(--green-soft); }
.absen-btn.H.active { background: var(--green); color: #fff; border-color: var(--green); }
.absen-btn.I { background: #FFF3CD; color: #856404; border-color: #FFF3CD; }
.absen-btn.I.active { background: #FFC107; color: #fff; border-color: #FFC107; }
.absen-btn.S { background: #D1ECF1; color: #0C5460; border-color: #D1ECF1; }
.absen-btn.S.active { background: #17A2B8; color: #fff; border-color: #17A2B8; }
.absen-btn.A { background: var(--rose-soft); color: var(--rose); border-color: var(--rose-soft); }
.absen-btn.A.active { background: var(--rose); color: #fff; border-color: var(--rose); }

/* Mobile */
.sidebar-overlay { display: none; }
@media (max-width: 900px) {
  .sidebar {
    position: fixed; left: -100%; top: var(--nav-h);
    height: calc(100vh - var(--nav-h));
    z-index: 40; box-shadow: var(--shadow-lg);
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay {
    display: none; position: fixed;
    inset: 0; top: var(--nav-h);
    background: rgba(0,0,0,.4); z-index: 39;
  }
  .sidebar-overlay.show { display: block; }
  .main-content { padding: 16px 14px 80px; }
  .form-row { grid-template-columns: 1fr; }
  .modal { margin: 10px; max-height: 95vh; }
}
@media (min-width: 901px) {
  .menu-toggle { display: none; }
}

/* Animations */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }

/* PWA safe area */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .main-content { padding-bottom: max(80px, calc(20px + env(safe-area-inset-bottom))); }
}

/* Print */
@media print {
  .topnav, .sidebar, .btn, .modal-overlay { display: none !important; }
  .main-content { padding: 0; }
}
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen" style="display:none;">
    <div class="login-card">
      <img class="login-logo" id="loginLogo" src="" alt="Logo PPG">
      <h1 class="login-title">Kitabah</h1>
      <p class="login-subtitle">Buku Target Kurikulum Generus<br>PPG Sidoarjo Utara</p>
      <div class="tab-row">
        <button class="tab-btn active" data-tab="masuk">Masuk</button>
        <button class="tab-btn" data-tab="daftar">Daftar Akun</button>
      </div>
      <div id="loginAlert"></div>

      <!-- Form Masuk -->
      <div id="panelMasuk">
        <div class="field"><label>Nama Pengguna</label>
          <input type="text" id="loginUser" placeholder="contoh: budi.santoso" autocomplete="username">
        </div>
        <div class="field"><label>Kata Sandi</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="loginBtn">Masuk</button>
      </div>

      <!-- Form Daftar -->
      <div id="panelDaftar" style="display:none;">
        <div class="field"><label>Jenis Akun</label>
          <select id="regTipe">
            <option value="umum">Pengurus / Guru Umum</option>
            <option value="kelompok">Pengelola Kelompok</option>
            <option value="pjp_kelompok">PJP Kelompok</option>
            <option value="wali_kbm">Wali KBM</option>
            <option value="guru">Guru Generus</option>
            <option value="desa">Level Desa</option>
            <option value="daerah">Level Daerah</option>
          </select>
        </div>
        <div class="field" id="regKelompokField" style="display:none;"><label>Pilih Kelompok</label>
          <select id="regKelompok"><option value="">Memuat...</option></select>
        </div>
        <div class="field" id="regDesaField" style="display:none;"><label>Pilih Desa</label>
          <select id="regDesa"><option value="">Memuat...</option></select>
        </div>
        <div class="field"><label>Nama Lengkap</label>
          <input type="text" id="regNama" placeholder="Nama Anda">
        </div>
        <div class="field"><label>Nama Pengguna</label>
          <input type="text" id="regUser" placeholder="contoh: budi.santoso" autocomplete="username">
        </div>
        <div class="field"><label>Kata Sandi</label>
          <input type="password" id="regPass" placeholder="Min. 6 karakter" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="regBtn">Daftar</button>
        <div class="login-hint">Setelah mendaftar, akun Anda perlu disetujui admin sebelum dapat masuk.</div>
      </div>
    </div>
  </div>

  <!-- PENDING -->
  <div class="pending-screen" id="pendingScreen" style="display:none;">
    <div class="pending-card">
      <div class="pending-icon">⏳</div>
      <h2 class="login-title">Menunggu Persetujuan</h2>
      <p class="login-subtitle">Akun <b id="pendingUsername"></b> sudah terdaftar. Admin perlu menyetujui sebelum Anda dapat masuk.</p>
      <button class="btn-wa" id="pendingWaBtn" style="display:none; width:100%; justify-content:center; margin-bottom:10px;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.85.5 3.58 1.4 5.07L2 22l5.25-1.38c1.43.78 3.06 1.22 4.79 1.22 5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.61 14.1c-.24.66-1.39 1.26-1.92 1.34-.49.07-1.11.1-1.79-.11-.41-.13-.94-.3-1.61-.59-2.84-1.23-4.69-4.09-4.83-4.28-.14-.19-1.15-1.53-1.15-2.91 0-1.38.72-2.06.98-2.34.26-.28.56-.35.75-.35h.54c.17.01.41-.07.64.49.24.58.81 2 .88 2.15.07.15.12.33.02.53-.1.2-.16.32-.31.49-.15.17-.32.38-.46.51-.15.14-.31.29-.13.61.18.32.8 1.32 1.72 2.14 1.18 1.05 2.18 1.37 2.5 1.52.32.15.51.13.7-.08.19-.21.81-.94 1.03-1.27.22-.32.43-.27.73-.16.3.11 1.9.9 2.23 1.06.32.16.54.24.62.38.08.13.08.78-.16 1.44z"/></svg>
        Info WhatsApp ke Admin
      </button>
      <button class="btn-outline btn" style="width:100%; justify-content:center;" onclick="showLogin()">Kembali ke Halaman Masuk</button>
    </div>
  </div>

  <!-- MAIN SHELL -->
  <div class="shell" id="appShell" style="display:none;">
    <!-- Top Nav -->
    <nav class="topnav">
      <button class="menu-toggle" id="menuToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topnav-brand">Kita<span>bah</span></div>
      <div class="topnav-user">
        <div class="topnav-user-info" style="text-align:right;">
          <div class="topnav-user-name" id="navUserName">—</div>
          <div class="topnav-user-role" id="navUserRole">—</div>
        </div>
        <div class="avatar" id="navAvatar">?</div>
      </div>
    </nav>

    <div class="shell-body">
      <!-- Sidebar Overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav" id="sidebarNav">
          <!-- diisi oleh JS berdasarkan role -->
        </nav>
        <div class="sidebar-footer">
          <button class="logout-btn" id="logoutBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Keluar
          </button>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content" id="mainContent">
        <!-- diisi oleh router JS -->
      </main>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner dark"></div>
    <div style="font-size:13px; color:var(--ink-soft);">Memuat...</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- bcryptjs for password verification -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<!-- Supabase client -->
<script src="supabase.js"></script>
<!-- Main App -->
<script src="app.js"></script>
</body>
</html>
